name: Deploy DC86 Stream Toolkit

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Frontend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build --no-cache -f frontend/Dockerfile.prod \
            --build-arg VITE_API_URL=https://dc86toolkit.duckdns.org \
            -t $REGISTRY/dc86-frontend:latest ./frontend
          docker push $REGISTRY/dc86-frontend:latest

      - name: Build & Push Backend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f backend/Dockerfile.prod -t $REGISTRY/dc86-backend:latest ./backend
          docker push $REGISTRY/dc86-backend:latest

      - name: Build & Push Bot
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/dc86-bot:latest ./bot
          docker push $REGISTRY/dc86-bot:latest

  deploy:
    name: Deploy auf EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d "/home/ubuntu/dc86-stream-toolkit" ]; then
              git clone https://github.com/chrislittle1986/dc86-stream-toolkit.git /home/ubuntu/dc86-stream-toolkit
            fi

            cd /home/ubuntu/dc86-stream-toolkit
            git pull origin main

            aws ecr get-login-password --region eu-central-1 | \
              docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com && \
            docker compose -f docker-compose.prod.yml pull && \
            docker compose -f docker-compose.prod.yml up -d